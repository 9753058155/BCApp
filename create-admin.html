<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BC Circle - Create Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0d0d1a; color: #e8d5b7; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .card { background: #14142a; border: 1px solid rgba(201,168,76,0.25); border-radius: 16px; padding: 32px; max-width: 420px; width: 100%; }
    h1 { color: #c9a84c; font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #8a7a6a; font-size: 0.85rem; margin-bottom: 24px; }
    label { display: block; color: #8a7a6a; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; margin-top: 14px; }
    input { width: 100%; padding: 10px 14px; background: #1a1a35; border: 1px solid rgba(201,168,76,0.25); border-radius: 10px; color: #e8d5b7; font-size: 0.95rem; }
    input:focus { outline: none; border-color: #c9a84c; }
    button { width: 100%; margin-top: 20px; padding: 12px; background: linear-gradient(135deg, #c9a84c, #9a7a2e); color: #0d0d1a; border: none; border-radius: 10px; font-weight: 700; font-size: 1rem; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 16px; padding: 12px; border-radius: 10px; font-size: 0.85rem; display: none; }
    .success { background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.3); color: #2ecc71; }
    .error { background: rgba(230,57,70,0.1); border: 1px solid rgba(230,57,70,0.3); color: #e63946; }
    .warning { background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); color: #c9a84c; font-size: 0.8rem; margin-top: 12px; padding: 10px; border-radius: 8px; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🪙 BC Circle Setup</h1>
    <p>Create the admin account. Run this ONCE before deploying.</p>

    <div class="warning">
      ⚠️ First update the Firebase config below in the script tag before using this page!
    </div>

    <label>Admin Name</label>
    <input type="text" id="name" value="Admin" />

    <label>Admin Email</label>
    <input type="email" id="email" value="admin@bccircle.com" />

    <label>Admin Password</label>
    <input type="password" id="password" value="Admin@12345" />

    <button onclick="createAdmin()" id="btn">Create Admin Account</button>
    <div id="status"></div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    // ⚠️ PASTE YOUR FIREBASE CONFIG HERE:
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = {
  apiKey: "AIzaSyD_2kHt53Ny4UCWsMRyPzlvDsBgktRc-y4",
  authDomain: "bcapp-15130.firebaseapp.com",
  databaseURL: "https://bcapp-15130-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bcapp-15130",
  storageBucket: "bcapp-15130.appspot.com",
  messagingSenderId: "946729397276",
  appId: "1:946729397276:web:d11068740200b4962643d9"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.createAdmin = async function() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');

      if (!name || !email || !password) {
        showStatus('Fill all fields!', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating...';

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, 'players', cred.user.uid), {
          name, email,
          isAdmin: true,
          hasWon: true,
          wonMonth: null,
          createdAt: new Date().toISOString()
        });
        showStatus(`✅ Admin "${name}" created! UID: ${cred.user.uid}\n\nNow open your app and login with:\nEmail: ${email}\nPassword: ${password}`, 'success');
        btn.textContent = 'Admin Created!';
      } catch (err) {
        showStatus(`❌ Error: ${err.message}`, 'error');
        btn.disabled = false;
        btn.textContent = 'Create Admin Account';
      }
    };

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
